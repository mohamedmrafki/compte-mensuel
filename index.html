<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#C8A45A" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Chauffeur" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <title>Mes Comptes Chauffeur</title>
    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      html { scroll-behavior: smooth; }
      html { height: -webkit-fill-available; }
      body {
        background:
          url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence baseFrequency='0.9' numOctaves='3' /><feColorMatrix values='0 0 0 0 0.2 0 0 0 0 0.18 0 0 0 0 0.13 0 0 0 0.06 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' /></svg>"),
          radial-gradient(circle at 20% 10%, rgba(200,164,90,0.08) 0%, transparent 40%),
          radial-gradient(circle at 80% 60%, rgba(200,164,90,0.05) 0%, transparent 40%),
          #08070C;
        color: #F2EDE1;
        overscroll-behavior-x: none;
        font-family: 'Inter', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        min-height: 100vh;
        min-height: -webkit-fill-available;
      }
      input, select, textarea, button { font-family: inherit; touch-action: manipulation; }
      input[type="number"]::-webkit-inner-spin-button,
      input[type="number"]::-webkit-outer-spin-button { opacity: 1; }
      ::selection { background: rgba(200,164,90,0.25); color: #F0DAA8; }
      ::-webkit-scrollbar { width: 3px; height: 3px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #2A2218; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #C8A45A; }

      @keyframes fadeUp   { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
      @keyframes fadeIn   { from { opacity:0; } to { opacity:1; } }
      @keyframes slideUp  { from { opacity:0; transform:translateY(48px); } to { opacity:1; transform:translateY(0); } }
      @keyframes shake    { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-7px)} 40%,80%{transform:translateX(7px)} }
      @keyframes glow     { 0%,100%{box-shadow:0 0 18px rgba(212,168,83,0.25)} 50%{box-shadow:0 0 32px rgba(212,168,83,0.5)} }
      @keyframes dotPop   { 0%{transform:scale(0)} 60%{transform:scale(1.25)} 100%{transform:scale(1)} }

      .fade-up   { animation: fadeUp  0.32s cubic-bezier(.16,1,.3,1) both; }
      .fade-in   { animation: fadeIn  0.25s ease both; }
      .slide-up  { animation: slideUp 0.42s cubic-bezier(.16,1,.3,1) both; }
      .shake     { animation: shake   0.38s ease; }
      .dot-pop   { animation: dotPop  0.2s cubic-bezier(.16,1,.3,1) both; }

      @media (prefers-reduced-motion: reduce) {
        .fade-up, .fade-in, .slide-up, .shake, .dot-pop { animation: none !important; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {})
        })
      }
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
